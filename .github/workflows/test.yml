name: Tests

on:
  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Swift 6.3
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Test
        run: swift test
