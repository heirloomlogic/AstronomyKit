name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test
        run: swift test

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Test
        run: swift test

  test-thread-sanitizer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Test (Thread Sanitizer)
        # Synchronization.Mutex is not modeled by ThreadSanitizer on Linux, so
        # Mutex-guarded state is falsely reported as racing under contention.
        # The suppressions file documents these known false positives.
        env:
          TSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/tsan-suppressions.txt
        run: swift test --sanitize=thread

  test-release-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test (release)
        run: swift test -c release

  test-release-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Test (release)
        run: swift test -c release

  # The macOS jobs above exercise the shared source, but the iOS/tvOS/watchOS
  # SDKs compile differently (availability, unavailable APIs). Build the library
  # for each declared Apple platform so a platform-specific break is caught here
  # rather than in a consumer's app. Build-only: running would require booting a
  # simulator, and the behavior is already covered by the macOS test jobs.
  build-apple-platforms:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [iOS, tvOS, watchOS]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build (${{ matrix.platform }})
        run: |
          xcodebuild build \
            -scheme AstronomyKit \
            -destination "generic/platform=${{ matrix.platform }}"
