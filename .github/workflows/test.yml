name: Tests

on:
  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -switch /Applications/Xcode_26.3.app

      - name: Test
        run: swift test
